services:
  db:
    container_name: postgres-spring-boot
    image: postgres:latest
    environment:
      POSTGRES_USER: aspteam
      POSTGRES_PASSWORD: asp20252026
      POSTGRES_DB: forecastdb
      PGDATA: /data/postgres
    volumes:
      - db:/data/postgres
    ports:
      - "5332:5432"
    networks:
      - db
    restart: unless-stopped

  model-service:
    build: ./model-service
    container_name: flask-model
    ports:
      - "5000:5000"
    networks:
      - app-net
    restart: unless-stopped

networks:
  db:
    driver: bridge
  app-net:
    driver: bridge

volumes:
  db: